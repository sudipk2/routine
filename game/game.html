<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skeleton Dragon Cursor</title>

<style>
  body {
    margin: 0;
    background: #050505;
    overflow: hidden;
  }

  svg {
    width: 100vw;
    height: 100vh;
    display: block;
  }

  line {
    stroke: #e6e6e6;
    stroke-width: 2;
  }
</style>

</head>

<body>

<svg id="dragon"></svg>

<script>
const svg = document.getElementById("dragon");

// CONFIG
const POINTS = 25;        // body segments
const SPACING = 15;       // distance between segments
const SMOOTH = 0.25;      // follow speed

let mouse = { x: window.innerWidth/2, y: window.innerHeight/2 };

// create spine points
let spine = [];
for (let i = 0; i < POINTS; i++) {
  spine.push({ x: mouse.x, y: mouse.y });
}

// track mouse
window.addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

// animation loop
function animate() {
  // head follows mouse
  spine[0].x += (mouse.x - spine[0].x) * SMOOTH;
  spine[0].y += (mouse.y - spine[0].y) * SMOOTH;

  // body follows previous segment
  for (let i = 1; i < spine.length; i++) {
    let dx = spine[i-1].x - spine[i].x;
    let dy = spine[i-1].y - spine[i].y;
    let angle = Math.atan2(dy, dx);

    spine[i].x = spine[i-1].x - Math.cos(angle) * SPACING;
    spine[i].y = spine[i-1].y - Math.sin(angle) * SPACING;
  }

  draw();
  requestAnimationFrame(animate);
}

// draw skeleton
function draw() {
  svg.innerHTML = "";

  // spine
  for (let i = 0; i < spine.length - 1; i++) {
    createLine(spine[i], spine[i+1]);
  }

  // ribs
  for (let i = 2; i < spine.length - 2; i++) {
    let angle = Math.atan2(
      spine[i+1].y - spine[i-1].y,
      spine[i+1].x - spine[i-1].x
    );

    let ribLength = 10 + i * 0.5;

    let left = {
      x: spine[i].x + Math.cos(angle + Math.PI/2) * ribLength,
      y: spine[i].y + Math.sin(angle + Math.PI/2) * ribLength
    };

    let right = {
      x: spine[i].x + Math.cos(angle - Math.PI/2) * ribLength,
      y: spine[i].y + Math.sin(angle - Math.PI/2) * ribLength
    };

    createLine(spine[i], left);
    createLine(spine[i], right);
  }
}

// helper
function createLine(p1, p2) {
  let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
  line.setAttribute("x1", p1.x);
  line.setAttribute("y1", p1.y);
  line.setAttribute("x2", p2.x);
  line.setAttribute("y2", p2.y);
  svg.appendChild(line);
}

animate();
</script>

</body>
</html>
