<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skeleton Dragon</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#050508; overflow:hidden; cursor:none; width:100vw; height:100vh; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

let mouse = { x: canvas.width/2, y: canvas.height/2 };
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

const NUM_SEG = 40;
const SEG_DIST = 18;
const spine = [];
for(let i=0;i<NUM_SEG;i++) spine.push({x: canvas.width/2, y: canvas.height/2+i*SEG_DIST});

const flames = [];
let flameActive = false;
let flameDuration = 0;
const FLAME_DURATION = 1200;

const dust = Array.from({length:80},()=>({
  x: Math.random()*canvas.width,
  y: Math.random()*canvas.height,
  r: Math.random()*1.2+0.2,
  v: Math.random()*0.2+0.05,
  o: Math.random()*0.3+0.05
}));

let time = 0;

function spawnFlames(hx, hy, angle) {
  for(let i=0;i<8;i++) {
    const spread = (Math.random()-0.5)*0.6;
    const speed = Math.random()*10+6;
    flames.push({
      x: hx + Math.cos(angle)*35,
      y: hy + Math.sin(angle)*35,
      vx: Math.cos(angle+spread)*speed,
      vy: Math.sin(angle+spread)*speed,
      life: 1,
      decay: Math.random()*0.018+0.012,
      size: Math.random()*22+12,
      type: Math.random()<0.5?'fire':'ember'
    });
  }
}
window.addEventListener('mousedown', () => {
  if(!flameActive) {
    flameActive = true;
    flameDuration = FLAME_DURATION;
    lastFlameTime = Date.now();
  }
});

function updateFlames() {
  for(let i=flames.length-1;i>=0;i--) {
    const f = flames[i];
    f.x += f.vx;
    f.y += f.vy;
    f.vy += 0.04;
    f.vx *= 0.97;
    f.life -= f.decay;
    f.size *= 0.975;
    if(f.life<=0) flames.splice(i,1);
  }
}

function drawFlames() {
  flames.forEach(f => {
    ctx.save();
    const g = ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.size);
    if(f.type==='fire') {
      g.addColorStop(0,`rgba(255,255,180,${f.life})`);
      g.addColorStop(0.3,`rgba(255,160,0,${f.life*0.8})`);
      g.addColorStop(0.7,`rgba(255,50,0,${f.life*0.5})`);
      g.addColorStop(1,`rgba(80,0,0,0)`);
    } else {
      g.addColorStop(0,`rgba(255,210,50,${f.life})`);
      g.addColorStop(1,`rgba(255,80,0,0)`);
    }
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(f.x,f.y,f.size,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function bone(x1,y1,x2,y2,w,alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = w;
  ctx.lineCap = 'round';
  ctx.shadowColor = 'rgba(220,230,255,0.6)';
  ctx.shadowBlur = 4;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.restore();
}

function joint(x,y,r,alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#ffffff';
  ctx.fillStyle = 'rgba(180,200,255,0.25)';
  ctx.lineWidth = 1.8;
  ctx.shadowColor = 'rgba(200,220,255,0.8)';
  ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // inner dot
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(x,y,r*0.35,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawSkull(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle + Math.PI/2);

  ctx.strokeStyle = '#ffffff';
  ctx.fillStyle = 'rgba(200,215,255,0.06)';
  ctx.lineWidth = 2;
  ctx.shadowColor = 'rgba(220,235,255,0.9)';
  ctx.shadowBlur = 12;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Cranium
  ctx.beginPath();
  ctx.arc(0, -8, 26, Math.PI, 0, false);
  ctx.lineTo(20, 16);
  ctx.lineTo(15, 22);
  ctx.lineTo(-15, 22);
  ctx.lineTo(-20, 16);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Cheekbones
  ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-24,4); ctx.lineTo(-32,16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(24,4); ctx.lineTo(32,16); ctx.stroke();

  // Eye sockets
  ctx.fillStyle = '#050508';
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.arc(-9,2,8,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(9,2,8,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // Eye glow
  ctx.shadowBlur = 28;
  ctx.shadowColor = '#ff6000';
  ctx.fillStyle = 'rgba(255,110,0,0.95)';
  ctx.beginPath(); ctx.arc(-9,2,3.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(9,2,3.8,0,Math.PI*2); ctx.fill();

  ctx.shadowColor = 'rgba(220,235,255,0.9)';
  ctx.shadowBlur = 12;
  ctx.strokeStyle = '#ffffff';

  // Snout
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-15,22);
  ctx.lineTo(-20,34);
  ctx.lineTo(-15,48);
  ctx.lineTo(15,48);
  ctx.lineTo(20,34);
  ctx.lineTo(15,22);
  ctx.stroke();

  // Upper teeth
  ctx.lineWidth=1.5;
  [-10,-5,0,5,10].forEach(tx => {
    ctx.beginPath(); ctx.moveTo(tx,22); ctx.lineTo(tx-2.5,32); ctx.lineTo(tx+2.5,32); ctx.closePath(); ctx.stroke();
  });
  // Lower teeth
  [-10,-5,0,5,10].forEach(tx => {
    ctx.beginPath(); ctx.moveTo(tx,48); ctx.lineTo(tx-2.5,38); ctx.lineTo(tx+2.5,38); ctx.closePath(); ctx.stroke();
  });

  // Nasal cavity
  ctx.beginPath();
  ctx.moveTo(-4,36); ctx.lineTo(0,30); ctx.lineTo(4,36); ctx.lineTo(3,42); ctx.lineTo(-3,42);
  ctx.closePath(); ctx.stroke();

  // Big curved horns
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-18,-20);
  ctx.bezierCurveTo(-42,-40,-48,-68,-24,-80);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(18,-20);
  ctx.bezierCurveTo(42,-40,48,-68,24,-80);
  ctx.stroke();

  // Crest spikes
  ctx.lineWidth=1.8;
  [[-6,-30,-18,-50],[0,-32,0,-54],[6,-30,18,-50]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });

  ctx.restore();
}

function drawRib(cx, cy, angle, ribLen, side, alpha) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2.2;
  ctx.lineCap = 'round';
  ctx.shadowColor = 'rgba(220,230,255,0.8)';
  ctx.shadowBlur = 6;

  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.bezierCurveTo(
    side*ribLen*0.5, -ribLen*0.35,
    side*ribLen*1.0, ribLen*0.55,
    side*ribLen*0.45, ribLen*0.95
  );
  ctx.stroke();

  // Rib tip
  const tipX = side*ribLen*0.45;
  const tipY = ribLen*0.95;
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(tipX,tipY,3,0,Math.PI*2); ctx.fill(); ctx.stroke();

  ctx.restore();
}

function drawWing(x, y, bodyAngle, side, t, alpha) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(bodyAngle);
  ctx.globalAlpha = alpha;

  const flap = Math.sin(t*1.8)*40*side;
  const flapY = Math.abs(Math.sin(t*1.8))*25;

  ctx.strokeStyle='#ffffff';
  ctx.lineWidth=3;
  ctx.lineCap='round';
  ctx.shadowColor='rgba(220,230,255,0.8)';
  ctx.shadowBlur=8;

  joint(0,0,7,alpha);

  // Main upper arm
  const armX = side*(100+flap);
  const armY = -40+flapY;
  bone(0,0,armX,armY,3.5,alpha);
  joint(armX,armY,6,alpha);

  // Forearm
  const foreX = side*(armX*0.6 + side*30);
  const foreY = armY+40+flapY*0.3;
  bone(armX,armY,foreX,foreY,3,alpha);
  joint(foreX,foreY,5,alpha);

  // 4 long finger bones
  const fingers = [
    { ex: side*(foreX*0.5+side*80), ey: foreY+90 },
    { ex: side*(foreX*0.3+side*110), ey: foreY+140 },
    { ex: side*(foreX*0.0+side*100), ey: foreY+185 },
    { ex: side*(foreX*-0.3+side*70), ey: foreY+220 },
  ];
  fingers.forEach((f,i)=>{
    const w = 2.8-i*0.4;
    bone(foreX,foreY,f.ex,f.ey,w,alpha);
    joint(f.ex,f.ey,3.5-i*0.4,alpha*0.85);
  });

  // Elbow strut from shoulder
  const elbowX = side*(50+flap*0.4);
  const elbowY = 30+flapY*0.4;
  bone(0,0,elbowX,elbowY,2.5,alpha);
  joint(elbowX,elbowY,4.5,alpha);
  bone(elbowX,elbowY,armX,armY,2,alpha*0.7);

  // Wing membrane
  ctx.globalAlpha = alpha*0.12;
  ctx.fillStyle='rgba(160,190,255,0.5)';
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(armX,armY);
  ctx.lineTo(foreX,foreY);
  fingers.forEach(f=>ctx.lineTo(f.ex,f.ey));
  ctx.lineTo(elbowX,elbowY);
  ctx.closePath();
  ctx.fill();

  ctx.globalAlpha=alpha*0.18;
  ctx.strokeStyle='rgba(200,220,255,0.4)';
  ctx.lineWidth=1;
  ctx.stroke();

  ctx.restore();
}

function drawTailSpike(x, y, angle, size, alpha) {
  if(size<3) return;
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(angle);
  ctx.globalAlpha=alpha;
  ctx.strokeStyle='#ffffff';
  ctx.fillStyle='rgba(210,220,255,0.12)';
  ctx.lineWidth=1.8;
  ctx.shadowColor='rgba(220,230,255,0.6)';
  ctx.shadowBlur=5;
  ctx.lineCap='round';
  ctx.lineJoin='round';
  // Diamond-shaped tail spike
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(-size*0.55,size*1.5);
  ctx.lineTo(0,size*0.4);
  ctx.lineTo(size*0.55,size*1.5);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.restore();
}

function update() {
  spine[0].x += (mouse.x - spine[0].x)*0.15;
  spine[0].y += (mouse.y - spine[0].y)*0.15;

  for(let i=1;i<NUM_SEG;i++) {
    const dx = spine[i].x - spine[i-1].x;
    const dy = spine[i].y - spine[i-1].y;
    const d = Math.sqrt(dx*dx+dy*dy);
    if(d > SEG_DIST) {
      spine[i].x = spine[i-1].x + dx/d*SEG_DIST;
      spine[i].y = spine[i-1].y + dy/d*SEG_DIST;
    }
  }

  const now = Date.now();
  if(!flameActive && now-lastFlameTime > FLAME_INTERVAL) {
    flameActive = true;
    flameDuration = FLAME_DURATION;
    lastFlameTime = now;
  }
  if(flameActive) {
    flameDuration -= 16;
    if(flameDuration<=0) flameActive=false;
    if(NUM_SEG>1) {
      const hx=spine[0].x, hy=spine[0].y;
      const nx=spine[1].x, ny=spine[1].y;
      const ang=Math.atan2(hy-ny, hx-nx);
      spawnFlames(hx,hy,ang);
    }
  }
  updateFlames();
  time+=0.04;
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Stars
  dust.forEach(p=>{
    p.y-=p.v;
    if(p.y<0){p.y=canvas.height;p.x=Math.random()*canvas.width;}
    ctx.save(); ctx.globalAlpha=p.o; ctx.fillStyle='#b8ccff';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.restore();
  });

  // Flames behind
  drawFlames();

  // Spine
  for(let i=1;i<NUM_SEG;i++){
    const alpha=Math.max(0.3,0.92-i/NUM_SEG*0.5);
    const w=Math.max(1,3.8-i*0.07);
    bone(spine[i-1].x,spine[i-1].y,spine[i].x,spine[i].y,w,alpha);
  }

  // Joints
  for(let i=0;i<NUM_SEG;i++){
    const r=Math.max(2.5,5.5-i*0.1);
    const alpha=Math.max(0.35,0.9-i/NUM_SEG*0.4);
    joint(spine[i].x,spine[i].y,r,alpha);
  }

  // Ribs (segments 3-20)
  for(let i=3;i<=20&&i<NUM_SEG;i++){
    const s=spine[i], p=spine[i-1];
    const ang=Math.atan2(s.y-p.y,s.x-p.x)+Math.PI/2;
    const t=(i-3)/17;
    const ribLen=62-t*28;
    const alpha=0.9-Math.abs(t-0.5)*0.5;
    drawRib(s.x,s.y,ang,ribLen,1,alpha);
    drawRib(s.x,s.y,ang,ribLen,-1,alpha);
  }

  // Wings on segment 5
  if(NUM_SEG>5){
    const ws=spine[5], wn=spine[4];
    const wingAngle=Math.atan2(ws.y-wn.y,ws.x-wn.x)+Math.PI/2;
    drawWing(ws.x,ws.y,wingAngle,1,time,0.92);
    drawWing(ws.x,ws.y,wingAngle,-1,time,0.92);
  }

  // Tail spikes on last 16 segments
  for(let i=NUM_SEG-18;i<NUM_SEG;i++){
    if(i<1) continue;
    const s=spine[i], p=spine[i-1];
    const ang=Math.atan2(s.y-p.y,s.x-p.x);
    const prog=(i-(NUM_SEG-18))/18;
    const size=28*(1-prog)+4;
    const alpha=0.85-prog*0.35;
    drawTailSpike(s.x,s.y,ang,size,alpha);
  }

  // Skull
  if(NUM_SEG>1){
    const h=spine[0], n=spine[1];
    const ang=Math.atan2(h.y-n.y,h.x-n.x);
    drawSkull(h.x,h.y,ang);
  }

  // Fire breath HUD
  if(flameActive){
    ctx.save();
    ctx.font='bold 14px monospace';
    ctx.shadowColor='#ff6600';
    ctx.shadowBlur=20;
    ctx.fillStyle='rgba(255,120,20,0.9)';
    ctx.fillText('🔥 FIRE BREATH', 16, canvas.height-18);
    ctx.restore();
  } 
  }


function loop(){
  update(); draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
