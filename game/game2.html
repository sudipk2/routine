<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skeleton Dragon</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#050508; overflow:hidden; cursor:none; width:100vw; height:100vh; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

let mouse = { x: canvas.width/2, y: canvas.height/2 };
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

const NUM_SEG = 22;
const SEG_DIST = 18;
const spine = [];
for(let i=0;i<NUM_SEG;i++) spine.push({x: canvas.width/2, y: canvas.height/2+i*SEG_DIST});

const flames = [];
let lastFlameTime = 0;
let flameActive = false;
let flameDuration = 0;
const FLAME_COOLDOWN = 3000;
const FLAME_DURATION = 1200;

const dust = Array.from({length:80},()=>({
  x: Math.random()*canvas.width, y: Math.random()*canvas.height,
  r: Math.random()*1.2+0.2, v: Math.random()*0.2+0.05, o: Math.random()*0.3+0.05
}));

let time = 0;

window.addEventListener('mousedown', () => {
  const now = Date.now();
  if(!flameActive && now - lastFlameTime > FLAME_COOLDOWN) {
    flameActive = true; flameDuration = FLAME_DURATION; lastFlameTime = now;
  }
});

// ── helpers ──
function bone(x1,y1,x2,y2,w,alpha) {
  ctx.save(); ctx.globalAlpha=alpha; ctx.strokeStyle='#fff'; ctx.lineWidth=w;
  ctx.lineCap='round'; ctx.shadowColor='rgba(220,230,255,0.6)'; ctx.shadowBlur=4;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.restore();
}
function joint(x,y,r,alpha) {
  ctx.save(); ctx.globalAlpha=alpha; ctx.strokeStyle='#fff';
  ctx.fillStyle='rgba(180,200,255,0.25)'; ctx.lineWidth=1.8;
  ctx.shadowColor='rgba(200,220,255,0.8)'; ctx.shadowBlur=6;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(x,y,r*0.35,0,Math.PI*2); ctx.fill(); ctx.restore();
}

// ── SKULL ──
function drawSkull(x, y, angle) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(angle + Math.PI/2);
  ctx.strokeStyle='#fff'; ctx.fillStyle='rgba(200,215,255,0.06)';
  ctx.lineWidth=2; ctx.shadowColor='rgba(220,235,255,0.9)'; ctx.shadowBlur=12;
  ctx.lineCap='round'; ctx.lineJoin='round';

  ctx.beginPath(); ctx.arc(0,-8,26,Math.PI,0,false);
  ctx.lineTo(20,16); ctx.lineTo(15,22); ctx.lineTo(-15,22); ctx.lineTo(-20,16);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-24,4); ctx.lineTo(-32,16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(24,4); ctx.lineTo(32,16); ctx.stroke();

  ctx.fillStyle='#050508'; ctx.strokeStyle='#fff'; ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.arc(-9,2,8,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(9,2,8,0,Math.PI*2); ctx.fill(); ctx.stroke();

  ctx.shadowBlur=28; ctx.shadowColor='#ff6000'; ctx.fillStyle='rgba(255,110,0,0.95)';
  ctx.beginPath(); ctx.arc(-9,2,3.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(9,2,3.8,0,Math.PI*2); ctx.fill();

  ctx.shadowColor='rgba(220,235,255,0.9)'; ctx.shadowBlur=12; ctx.strokeStyle='#fff';
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-15,22); ctx.lineTo(-20,34); ctx.lineTo(-15,48);
  ctx.lineTo(15,48); ctx.lineTo(20,34); ctx.lineTo(15,22); ctx.stroke();

  ctx.lineWidth=1.5;
  [-10,-5,0,5,10].forEach(tx => {
    ctx.beginPath(); ctx.moveTo(tx,22); ctx.lineTo(tx-2.5,32); ctx.lineTo(tx+2.5,32); ctx.closePath(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tx,48); ctx.lineTo(tx-2.5,38); ctx.lineTo(tx+2.5,38); ctx.closePath(); ctx.stroke();
  });

  ctx.beginPath(); ctx.moveTo(-4,36); ctx.lineTo(0,30); ctx.lineTo(4,36); ctx.lineTo(3,42); ctx.lineTo(-3,42); ctx.closePath(); ctx.stroke();

  ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(-18,-20); ctx.bezierCurveTo(-42,-40,-48,-68,-24,-80); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(18,-20); ctx.bezierCurveTo(42,-40,48,-68,24,-80); ctx.stroke();

  ctx.lineWidth=1.8;
  [[-6,-30,-18,-50],[0,-32,0,-54],[6,-30,18,-50]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });
  ctx.restore();
}

// ── RIBS ──
function drawRib(cx, cy, angle, ribLen, side, alpha) {
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle); ctx.globalAlpha=alpha;
  ctx.strokeStyle='#fff'; ctx.lineWidth=2.2; ctx.lineCap='round';
  ctx.shadowColor='rgba(220,230,255,0.8)'; ctx.shadowBlur=6;
  ctx.beginPath(); ctx.moveTo(0,0);
  ctx.bezierCurveTo(side*ribLen*0.5,-ribLen*0.35, side*ribLen*1.0,ribLen*0.55, side*ribLen*0.45,ribLen*0.95);
  ctx.stroke();
  const tx=side*ribLen*0.45, ty=ribLen*0.95;
  ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(tx,ty,3,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.restore();
}

// ── WING — truly opposite sides using perpendicular angle ──
function drawWing(x, y, bodyAngle, side, alpha) {
  ctx.save(); ctx.translate(x, y); ctx.globalAlpha=alpha;
  ctx.strokeStyle='#fff'; ctx.lineCap='round';
  ctx.shadowColor='rgba(220,230,255,0.8)'; ctx.shadowBlur=8;

  // perpendicular direction — side=1 goes LEFT, side=-1 goes RIGHT of travel
  const perp = bodyAngle + side * Math.PI/2;
  const flap = Math.sin(time*1.8) * 25;
  const lift = Math.abs(Math.sin(time*1.8)) * 18;

  // Shoulder (upper arm) — goes outward perpendicular
  const ax = Math.cos(perp) * (85 + flap);
  const ay = Math.sin(perp) * (85 + flap) - lift;
  bone(0,0,ax,ay,3.5,alpha); joint(ax,ay,6,alpha);

  // Elbow brace strut
  const ea = perp + side*0.5;
  const ex = Math.cos(ea)*42, ey = Math.sin(ea)*42 + lift*0.3;
  bone(0,0,ex,ey,2.5,alpha); joint(ex,ey,4.5,alpha);
  bone(ex,ey,ax,ay,2,alpha*0.65);

  // Wrist (forearm)
  const wa = perp + side*0.25;
  const wx = ax + Math.cos(wa)*40, wy = ay + Math.sin(wa)*40 + lift*0.15;
  bone(ax,ay,wx,wy,3,alpha); joint(wx,wy,5,alpha);

  // 4 finger bones fan out from wrist
  const fingerAngles = [perp - side*0.45, perp, perp + side*0.38, perp + side*0.82];
  const fingerLens   = [95, 125, 118, 88];
  const fps = fingerAngles.map((fa,i) => ({
    x: wx + Math.cos(fa)*fingerLens[i],
    y: wy + Math.sin(fa)*fingerLens[i]
  }));
  fps.forEach((f,i) => {
    bone(wx,wy,f.x,f.y,2.5-i*0.4,alpha);
    joint(f.x,f.y,3.5-i*0.45,alpha*0.85);
  });

  // Membrane
  ctx.globalAlpha=alpha*0.12;
  ctx.fillStyle='rgba(155,185,255,0.5)';
  ctx.beginPath();
  ctx.moveTo(0,0); ctx.lineTo(ax,ay); ctx.lineTo(wx,wy);
  fps.forEach(f=>ctx.lineTo(f.x,f.y));
  ctx.lineTo(ex,ey); ctx.closePath(); ctx.fill();
  ctx.globalAlpha=alpha*0.2; ctx.strokeStyle='rgba(200,220,255,0.4)'; ctx.lineWidth=1; ctx.stroke();

  joint(0,0,7,alpha);
  ctx.restore();
}

// ── TAIL SPIKES on both sides ──
function drawTailSpikes(x, y, angle, size, alpha) {
  if(size<3) return;
  // Draw spike on BOTH sides of the tail
  [-1, 1].forEach(side => {
    ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
    ctx.globalAlpha=alpha; ctx.strokeStyle='#fff';
    ctx.fillStyle='rgba(210,220,255,0.13)';
    ctx.lineWidth=1.6; ctx.shadowColor='rgba(220,230,255,0.6)'; ctx.shadowBlur=5;
    ctx.lineCap='round'; ctx.lineJoin='round';
    // spike perpendicular to tail direction on each side
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(side*size*1.1, -size*0.4);  // tip goes out sideways and slightly back
    ctx.lineTo(side*size*0.3, size*0.5);   // base slightly forward
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.restore();
  });
}

// ── SHARP V TAIL FIN ──
function drawVTail(x, y, angle, alpha) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle + Math.PI/2);
  ctx.globalAlpha=alpha; ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  ctx.lineCap='round'; ctx.lineJoin='miter'; ctx.miterLimit=15;
  ctx.shadowColor='rgba(220,230,255,0.8)'; ctx.shadowBlur=8;

  // Central stub
  bone(0,0,0,14,3,alpha); joint(0,14,5,alpha);

  // LEFT lobe — shoulder → elbow → wrist → 3 finger tips
  const lS={x:-10, y:8}, lE={x:-35, y:-5}, lW={x:-58, y:-22};
  bone(0,14,lS.x,lS.y,3,alpha); joint(lS.x,lS.y,4.5,alpha);
  bone(lS.x,lS.y,lE.x,lE.y,2.8,alpha); joint(lE.x,lE.y,4,alpha);
  bone(lE.x,lE.y,lW.x,lW.y,2.5,alpha); joint(lW.x,lW.y,3.5,alpha);
  bone(0,14,lE.x,lE.y,1.6,alpha*0.55); // brace

  const lFins=[{x:lW.x-28,y:lW.y+12},{x:lW.x-46,y:lW.y-14},{x:lW.x-52,y:lW.y-42},{x:lW.x-40,y:lW.y-68}];
  lFins.forEach((f,i)=>{ bone(lW.x,lW.y,f.x,f.y,2.2-i*0.4,alpha); joint(f.x,f.y,3-i*0.45,alpha*0.85); });

  // RIGHT lobe — mirror
  const rS={x:10, y:8}, rE={x:35, y:-5}, rW={x:58, y:-22};
  bone(0,14,rS.x,rS.y,3,alpha); joint(rS.x,rS.y,4.5,alpha);
  bone(rS.x,rS.y,rE.x,rE.y,2.8,alpha); joint(rE.x,rE.y,4,alpha);
  bone(rE.x,rE.y,rW.x,rW.y,2.5,alpha); joint(rW.x,rW.y,3.5,alpha);
  bone(0,14,rE.x,rE.y,1.6,alpha*0.55);

  const rFins=[{x:rW.x+28,y:rW.y+12},{x:rW.x+46,y:rW.y-14},{x:rW.x+52,y:rW.y-42},{x:rW.x+40,y:rW.y-68}];
  rFins.forEach((f,i)=>{ bone(rW.x,rW.y,f.x,f.y,2.2-i*0.4,alpha); joint(f.x,f.y,3-i*0.45,alpha*0.85); });

  // Membranes
  const drawMem = (pts) => {
    ctx.globalAlpha=alpha*0.13;
    ctx.fillStyle='rgba(155,185,255,0.5)';
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha=alpha*0.2; ctx.strokeStyle='rgba(200,220,255,0.35)'; ctx.lineWidth=1; ctx.stroke();
  };
  drawMem([{x:0,y:14},lS,lE,lW,...lFins]);
  drawMem([{x:0,y:14},rS,rE,rW,...rFins]);

  ctx.restore();
}

// ── FLAMES ──
function spawnFlames(hx, hy, angle) {
  for(let i=0;i<8;i++) {
    const spread=(Math.random()-0.5)*0.6, speed=Math.random()*10+6;
    flames.push({
      x:hx+Math.cos(angle)*35, y:hy+Math.sin(angle)*35,
      vx:Math.cos(angle+spread)*speed, vy:Math.sin(angle+spread)*speed,
      life:1, decay:Math.random()*0.018+0.012,
      size:Math.random()*22+12, type:Math.random()<0.5?'fire':'ember'
    });
  }
}
function updateFlames() {
  for(let i=flames.length-1;i>=0;i--) {
    const f=flames[i]; f.x+=f.vx; f.y+=f.vy; f.vy+=0.04; f.vx*=0.97;
    f.life-=f.decay; f.size*=0.975; if(f.life<=0) flames.splice(i,1);
  }
}
function drawFlames() {
  flames.forEach(f=>{
    ctx.save();
    const g=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.size);
    if(f.type==='fire'){
      g.addColorStop(0,`rgba(255,255,180,${f.life})`);
      g.addColorStop(0.3,`rgba(255,160,0,${f.life*0.8})`);
      g.addColorStop(0.7,`rgba(255,50,0,${f.life*0.5})`);
      g.addColorStop(1,'rgba(80,0,0,0)');
    } else {
      g.addColorStop(0,`rgba(255,210,50,${f.life})`);
      g.addColorStop(1,'rgba(255,80,0,0)');
    }
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(f.x,f.y,f.size,0,Math.PI*2); ctx.fill(); ctx.restore();
  });
}

// ── UPDATE ──
function update() {
  spine[0].x += (mouse.x-spine[0].x)*0.15;
  spine[0].y += (mouse.y-spine[0].y)*0.15;
  for(let i=1;i<NUM_SEG;i++){
    const dx=spine[i].x-spine[i-1].x, dy=spine[i].y-spine[i-1].y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d>SEG_DIST){ spine[i].x=spine[i-1].x+dx/d*SEG_DIST; spine[i].y=spine[i-1].y+dy/d*SEG_DIST; }
  }
  if(flameActive){
    flameDuration-=16; if(flameDuration<=0) flameActive=false;
    if(NUM_SEG>1){ const h=spine[0],n=spine[1]; spawnFlames(h.x,h.y,Math.atan2(h.y-n.y,h.x-n.x)); }
  }
  updateFlames(); time+=0.04;
}

// ── DRAW ──
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  dust.forEach(p=>{
    p.y-=p.v; if(p.y<0){p.y=canvas.height;p.x=Math.random()*canvas.width;}
    ctx.save(); ctx.globalAlpha=p.o; ctx.fillStyle='#b8ccff';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.restore();
  });

  drawFlames();

  // Spine
  for(let i=1;i<NUM_SEG;i++){
    const a=Math.max(0.3,0.92-i/NUM_SEG*0.5), w=Math.max(1,3.8-i*0.1);
    bone(spine[i-1].x,spine[i-1].y,spine[i].x,spine[i].y,w,a);
  }
  for(let i=0;i<NUM_SEG;i++){
    joint(spine[i].x,spine[i].y, Math.max(2.5,5.5-i*0.14), Math.max(0.35,0.9-i/NUM_SEG*0.4));
  }

  // Ribs seg 2–13
  for(let i=2;i<=13&&i<NUM_SEG;i++){
    const s=spine[i],p=spine[i-1];
    const ang=Math.atan2(s.y-p.y,s.x-p.x)+Math.PI/2;
    const prog=(i-2)/11, ribLen=58-prog*22, alpha=0.9-Math.abs(prog-0.5)*0.5;
    drawRib(s.x,s.y,ang,ribLen,1,alpha);
    drawRib(s.x,s.y,ang,ribLen,-1,alpha);
  }

  // Wings on segment 4 — one LEFT, one RIGHT of body
  if(NUM_SEG>4){
    const ws=spine[4], wp=spine[3];
    const bodyDir=Math.atan2(ws.y-wp.y,ws.x-wp.x);
    drawWing(ws.x,ws.y,bodyDir, 1, 0.92);  // LEFT wing
    drawWing(ws.x,ws.y,bodyDir,-1, 0.92);  // RIGHT wing
  }

  // Tail spikes on BOTH sides — seg 14 to end
  for(let i=14;i<NUM_SEG-1;i++){
    const s=spine[i],p=spine[i-1];
    const ang=Math.atan2(s.y-p.y,s.x-p.x);
    const prog=(i-14)/(NUM_SEG-14);
    const size=20*(1-prog)+5;
    const alpha=0.82-prog*0.3;
    drawTailSpikes(s.x,s.y,ang,size,alpha);
  }

  // V tail fin at last segment
  if(NUM_SEG>2){
    const tl=spine[NUM_SEG-1], tp=spine[NUM_SEG-2];
    drawVTail(tl.x,tl.y,Math.atan2(tl.y-tp.y,tl.x-tp.x),0.9);
  }

  // Skull
  if(NUM_SEG>1){
    const h=spine[0],n=spine[1];
    drawSkull(h.x,h.y,Math.atan2(h.y-n.y,h.x-n.x));
  }

  // HUD
  if(flameActive){
    ctx.save(); ctx.font='bold 14px monospace';
    ctx.shadowColor='#ff6600'; ctx.shadowBlur=20;
    ctx.fillStyle='rgba(255,120,20,0.9)';
   
  } else {
    const pct=Math.min(1,(Date.now()-lastFlameTime)/FLAME_COOLDOWN);
    ctx.save();
    ctx.globalAlpha=0.35; ctx.fillStyle='#333';
    ctx.fillRect(16,canvas.height-30,140,10);
    ctx.fillStyle=pct>=1?'#ff6600':'#883300';
   
    ctx.restore();
  }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
